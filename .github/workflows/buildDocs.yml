name: Run docToolchain

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Chromium and Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            chromium-browser \
            fonts-liberation \
            libasound2 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libatspi2.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libwayland-client0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xdg-utils

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Verify Mermaid CLI installation and create symlink
        run: |
          which mmdc
          mmdc --version
          echo "PATH=$PATH"
          sudo ln -sf $(which mmdc) /usr/local/bin/mmdc
          which mmdc
          ls -la /usr/local/bin/mmdc

      - name: Test mmdc with simple diagram
        run: |
          echo 'graph TD; A-->B;' > test.mmd
          PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser mmdc -i test.mmd -o test.png || echo "mmdc test failed"
          ls -la test.* || true
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Install docToolchain locally
        run: |
          cd ./federated-catalogue
          ./dtcw local install doctoolchain

      - name: Generate HTML Documentation
        run: |
          cd ./federated-catalogue
          ./dtcw local generateHTML
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_ARGS: "--no-sandbox --disable-setuid-sandbox"

      - name: Generate PDF Documentation
        run: |
          cd ./federated-catalogue
          ./dtcw local generatePDF
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          PUPPETEER_ARGS: "--no-sandbox --disable-setuid-sandbox"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Documentation
          path: |
            federated-catalogue/build/pdf/architecture/catalogue-architecture.pdf
            federated-catalogue/build/html5/
