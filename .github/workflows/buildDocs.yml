name: Run docToolchain

on:
  push:
    branches:
      - main


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Verify Mermaid CLI installation and create symlink
        run: |
          which mmdc
          mmdc --version
          echo "PATH=$PATH"
          sudo ln -sf $(which mmdc) /usr/local/bin/mmdc
          which mmdc
          ls -la /usr/local/bin/mmdc

      - name: Generate HTML Documentation
        run: |
          cd ./federated-catalogue
          ./dtcw local generateHTML

      - name: Generate PDF Documentation
        run: |
          cd ./federated-catalogue
          ./dtcw local generatePDF

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Documentation
          path: |
            federated-catalogue/build/pdf/architecture/catalogue-architecture.pdf
            federated-catalogue/build/html5/
